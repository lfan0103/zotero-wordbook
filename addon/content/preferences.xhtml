<linkset>
  <html:link rel="localization" href="__addonRef__-preferences.ftl" />
  <html:link
    rel="stylesheet"
    href="chrome://__addonRef__/content/preferences.css"
  />
</linkset>
<groupbox
  onload="Zotero.__addonInstance__.hooks.onPrefsEvent('load', { window })"
  flex="1"
>
  <label><html:h2 data-l10n-id="pref-title"></html:h2></label>
  <hbox align="center" style="margin: 8px 0" flex="1">
    <html:label
      for="zotero-prefpane-__addonRef__-target-highlight-color"
      data-l10n-id="pref-target-highlight-color"
      style="
        width: 100px;
        text-align: right;
        margin-right: 8px;
        display: inline-block;
        height: 28px;
        line-height: 28px;
      "
    ></html:label>
    <html:input
      type="text"
      id="zotero-prefpane-__addonRef__-target-highlight-color"
      preference="targetHighlightColor"
      placeholder="#aaaaaa"
      flex="1"
      style="
        min-width: 14em;
        height: 28px;
        border: 1px solid #ccc;
        border-radius: 0;
        padding: 2px 6px;
        margin: 0;
        vertical-align: middle;
        flex: 1;
        width: 100%;
      "
    ></html:input>
  </hbox>
  <hbox align="center" style="margin: 8px 0" flex="1">
    <html:label
      for="zotero-prefpane-__addonRef__-export-format"
      data-l10n-id="pref-export-format"
      style="
        width: 100px;
        text-align: right;
        margin-right: 8px;
        display: inline-block;
        height: 28px;
        line-height: 28px;
      "
    ></html:label>
    <menulist
      id="zotero-prefpane-__addonRef__-export-format"
      preference="exportFormat"
      style="
        min-width: 14em;
        background-color: white;
        border: 1px solid #ccc;
        border-radius: 0;
        font-weight: normal;
        -moz-appearance: none;
        height: 28px;
        padding: 2px 6px;
      "
      flex="1"
    >
      <menupopup>
        <menuitem value="bbdc-txt" label="不背单词 (TXT)"></menuitem>
        <menuitem value="anki-csv" label="CSV"></menuitem>
      </menupopup>
    </menulist>
  </hbox>
  <vbox
    id="zotero-prefpane-__addonRef__-csv-fields-container"
    style="margin: 12px 0 8px 108px; display: none"
    flex="1"
  >
    <html:label
      data-l10n-id="pref-csv-fields-title"
      style="font-weight: bold; margin-bottom: 8px; display: block"
    ></html:label>
    <!-- Field Selection -->
    <html:label
      data-l10n-id="pref-csv-fields-selection"
      style="font-size: 13px; color: #666; margin-bottom: 4px; display: block"
    ></html:label>
    <hbox
      id="zotero-prefpane-__addonRef__-csv-fields-selection"
      style="flex-wrap: wrap; gap: 12px; margin-bottom: 12px"
    >
      <!-- Selection checkboxes will be generated by JS -->
    </hbox>
    <!-- Field Order -->
    <html:label
      data-l10n-id="pref-csv-fields-order"
      style="font-size: 13px; color: #666; margin-bottom: 4px; display: block"
    ></html:label>
    <vbox id="zotero-prefpane-__addonRef__-csv-fields-order" style="gap: 4px">
      <!-- Order rows will be generated by JS -->
    </vbox>
  </vbox>
</groupbox>
